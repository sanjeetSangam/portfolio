<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Primary SEO Meta Tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1E293B" />
    <meta name="author" content="Sanjeet Kumar Sangam" />
    <meta
      name="description"
      content="Distinguished Full-Stack & DevOps Architect with over 3 years of experience. Specialist in high-performance digital products, specialized engineering teams, and production-grade automation."
    />
    <meta
      name="keywords"
      content="Sanjeet Kumar Sangam, Senior Software Architect, DevOps Lead, Full-Stack Developer, PostgreSQL, Automation, CI/CD, React, Node.js, Kubernetes, Docker, Professional Portfolio"
    />
    <title>Sanjeet Kumar Sangam | Senior Software Architect & DevOps Lead</title>

    <!-- Professional Branding & Favicon -->
    <link
      rel="icon"
      href="https://avatars.githubusercontent.com/u/93376461?v=4"
    />
    <link
      rel="apple-touch-icon"
      href="https://avatars.githubusercontent.com/u/93376461?v=4"
    />

    <!-- Social Graph (Open Graph / Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sanjeet-sangam.github.io/" />
    <meta property="og:title" content="Sanjeet Kumar Sangam | Senior Software Architect" />
    <meta
      property="og:description"
      content="Expert in engineering production-grade, high-availability ecosystems and polished frontend experiences."
    />
    <meta
      property="og:image"
      content="https://avatars.githubusercontent.com/u/93376461?v=4"
    />

    <!-- Twitter Preview -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://sanjeet-sangam.github.io/" />
    <meta name="twitter:title" content="Sanjeet Kumar Sangam | Senior Software Architect" />
    <meta
      name="twitter:description"
      content="Full-Stack & DevOps Architect specializing in high-performance digital products and automation."
    />
    <meta
      name="twitter:image"
      content="https://avatars.githubusercontent.com/u/93376461?v=4"
    />

    <!-- Clean Performance Configuration -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

    <div id="root"></div>

</html>
